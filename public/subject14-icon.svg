<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Subject 14 icon</title>
  <desc id="desc">A centered horror emblem with a framed 14 mark.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#150708" />
      <stop offset="52%" stop-color="#09090b" />
      <stop offset="100%" stop-color="#020202" />
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="42%" r="54%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity=".28" />
      <stop offset="65%" stop-color="#991b1b" stop-opacity=".08" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="frame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fecaca" />
      <stop offset="38%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#7f1d1d" />
    </linearGradient>
    <linearGradient id="plate" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f1f23" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".55" />
    </filter>
    <filter id="redGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#ef4444" flood-opacity=".38" />
    </filter>
    <pattern id="grid" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M22 0H0V22" fill="none" stroke="#ffffff" stroke-opacity=".04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="512" height="512" rx="120" fill="url(#bg)" />
  <rect width="512" height="512" rx="120" fill="url(#halo)" />
  <rect width="512" height="512" rx="120" fill="url(#grid)" opacity=".55" />

  <g opacity=".18">
    <path d="M92 122c42-24 92-38 156-38 78 0 143 18 185 52" fill="none" stroke="#7f1d1d" stroke-width="4" stroke-linecap="round" />
    <path d="M82 397c57 22 121 33 196 33 66 0 125-10 169-30" fill="none" stroke="#7f1d1d" stroke-width="4" stroke-linecap="round" />
  </g>

  <g filter="url(#shadow)">
    <circle cx="256" cy="238" r="145" fill="#050506" stroke="#ffffff" stroke-opacity=".07" stroke-width="2" />
    <circle cx="256" cy="238" r="133" fill="none" stroke="url(#frame)" stroke-width="10" opacity=".9" />
    <circle cx="256" cy="238" r="108" fill="none" stroke="#ffffff" stroke-opacity=".09" stroke-width="1.5" />

    <g transform="translate(146 126)">
      <rect x="0" y="0" width="220" height="224" rx="36" fill="url(#plate)" stroke="url(#frame)" stroke-width="8" />
      <rect x="12" y="12" width="196" height="200" rx="26" fill="none" stroke="#ffffff" stroke-opacity=".08" stroke-width="2" />

      <g opacity=".9">
        <path d="M42 44h40" stroke="#ef4444" stroke-width="4" stroke-linecap="round" />
        <path d="M138 44h40" stroke="#ef4444" stroke-width="4" stroke-linecap="round" />
        <text
          x="110"
          y="51"
          text-anchor="middle"
          font-family="Arial, sans-serif"
          font-size="16"
          font-weight="700"
          letter-spacing="8"
          fill="#fca5a5"
        >
          SUBJECT
        </text>
      </g>

      <g filter="url(#redGlow)">
        <text
          x="110"
          y="142"
          text-anchor="middle"
          dominant-baseline="middle"
          font-family="Arial Black, Arial, sans-serif"
          font-size="120"
          font-weight="900"
          letter-spacing="-6"
          fill="#f8fafc"
        >
          14
        </text>
      </g>

      <path d="M44 178h132" stroke="#ffffff" stroke-opacity=".12" stroke-width="2" />
      <path d="M44 190h78" stroke="#ef4444" stroke-opacity=".6" stroke-width="4" stroke-linecap="round" />
      <text
        x="110"
        y="196"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="14"
        font-weight="700"
        letter-spacing="5"
        fill="#d4d4d8"
      >
        ENTITY
      </text>
    </g>
  </g>
</svg>
